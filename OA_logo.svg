<svg width="680" height="280" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Accent corner brackets -->
  <path d="M60 60 L60 50 L70 50" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  <path d="M620 60 L620 50 L610 50" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  <path d="M60 220 L60 230 L70 230" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  <path d="M620 220 L620 230 L610 230" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>

  <!-- Decorative dots -->
  <circle cx="60" cy="140" r="3" fill="#f97316" opacity="0.4"/>
  <circle cx="620" cy="140" r="3" fill="#f97316" opacity="0.4"/>
  <circle cx="340" cy="45" r="3" fill="#f97316" opacity="0.3"/>
  <circle cx="340" cy="235" r="3" fill="#f97316" opacity="0.3"/>

  <!-- OA Monogram badge -->
  <rect x="210" y="75" width="100" height="100" rx="16" fill="#f97316"/>
  <text x="260" y="135" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#0f172a">OA</text>

  <!-- Badge corner dots -->
  <circle cx="210" cy="75" r="4" fill="#fb923c"/>
  <circle cx="310" cy="75" r="4" fill="#fb923c"/>
  <circle cx="210" cy="175" r="4" fill="#fb923c"/>
  <circle cx="310" cy="175" r="4" fill="#fb923c"/>

  <!-- Circuit line from badge -->
  <line x1="310" y1="125" x2="355" y2="125" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="355" cy="125" r="3" fill="#f97316"/>

  <!-- Name text -->
  <text x="370" y="108" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#0f172a" dominant-baseline="central">Ogugua</text>
  <text x="370" y="142" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#f97316" dominant-baseline="central">Assumpta</text>

  <!-- Tagline -->
  <text x="370" y="175" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#94a3b8" dominant-baseline="central">&lt;</text>
  <text x="382" y="175" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#64748b" dominant-baseline="central">Full Stack Developer</text>
  <text x="553" y="175" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#94a3b8" dominant-baseline="central">/&gt;</text>

  <!-- Underline accent -->
